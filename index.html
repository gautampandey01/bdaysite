<body>

</div>

        </div>


        <div class="boxMail">
            <i class="fa-solid fa-xmark"></i>
            <div class="boxMail-container">
                <div class="card1">
                    <div class="userImg">
                        <img src="images/unnamed.jpeg" alt="">
                    </div>

                    <h3>Happy Birthday</h3>

                        <img src="cute1.png" alt="">

                </div>

                    <div class="card2-content">
                        <h3>For You ❤️</h3>

                        </h2>

</body>
<script>
const startGift = document.getElementById("startGift");
const introScreen = document.getElementById("introScreen");
const music = document.getElementById("bgMusic");

startGift.addEventListener("click", () => {

    music.play();

    document.getElementById("wrapper").style.display = "block";

    startAashnaAnimation();   // <-- YAHAN

    introScreen.classList.add("introHide");

    setTimeout(() => {
        introScreen.style.display = "none";
    }, 800);

    setTimeout(() => {
        openCard();
    }, 18000);

});
    let datetxt = "❤️Aashna❤️";
  const text = `Happy Birthday, my love ❤️. Thank you for bringing so much happiness into my life. Every moment with you is special, and I’m grateful for every memory we share. I hope this year brings you endless smiles, beautiful surprises, and everything your heart wishes for. Enjoy your day, you deserve all the happiness in the world. 🎂✨`;
const target = document.getElementById("letterText");

let i = 0;

function typeLetter(){
    if(i < text.length){
        target.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeLetter, 35);
    }
}
    let titleLetter = "For Aashna";
    let charArrDate = datetxt.split('');
    let charArrTitle = titleLetter.split('');
    let currentIndex = 0;

    let currentIndexTitle = 0;
    let date__of__birth = document.querySelector(".date__of__birth span");
   
   function startAashnaAnimation() {

    setTimeout(function () {
        timeDatetxt = setInterval(function () {

            if (currentIndex < charArrDate.length) {
                date__of__birth.textContent += charArrDate[currentIndex];
                currentIndex++;
            } else {
                clearInterval(timeDatetxt);
            }

        }, 100);

    }, 12000);

}

    var intervalContent;
    var intervalTitle;
   
    $(".close").on("click", function () {
        clearInterval(intervalContent)
        document.querySelector(".title__letter").textContent = "";
        text__letter.textContent = "";
        currentIndexLetter = 0
        currentIndexTitle = 0
        document.querySelector("#heart__letter").classList.remove("animationOp");
        document.querySelector(".love__img").classList.remove("animationOp");
        document.querySelector("#mewmew").classList.remove("animationOp");
        document.querySelectorAll(".heart").forEach((item) => {
            item.classList.remove("animation")
        })
        $(".box__letter").slideUp();
        $(".letter__border").slideUp();
    })

let giftBox = document.querySelector('#giftBoxImg');
let boxmail = document.querySelector('.boxMail');

giftBox.addEventListener('click', openCard);

function openCard(){

    boxmail.classList.add('active');

    target.innerHTML = "";
    i = 0;

    const card1 = document.querySelector('.card1');

    // 2.5 sec baad second page open
    setTimeout(() => {
        card1.classList.add('openSecondPage');
    }, 1000);

    // page open hone ke 1 sec baad typing start
    setTimeout(() => {
        typeLetter();
    }, 3500);
}

   
    let closeBtn = document.querySelector('.fa-xmark');

closeBtn.addEventListener('click', () => {

    boxmail.classList.remove('active');

    document.querySelector('.card1')
        .classList.remove('openSecondPage');

    target.innerHTML = "";
    i = 0;
});
 
   

</script>

</html>
